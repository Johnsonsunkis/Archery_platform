<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏹 Rhythm Drill Timer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 50%, #3498db 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
.container { text-align: center; max-width: 420px; width: 90vw; background: rgba(255,255,255,0.12); backdrop-filter: blur(25px); border-radius: 25px; padding: 40px 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); }
h1 { font-size: 28px; margin-bottom: 25px; background: linear-gradient(45deg, #e91e63, #9c27b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.cycle-selector { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; }
.cycle-btn { padding: 12px 24px; font-size: 16px; font-weight: 600; border: 2px solid rgba(255,255,255,0.4); border-radius: 25px; background: rgba(255,255,255,0.15); color: white; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px); }
.cycle-btn.active { background: linear-gradient(45deg, #e91e63, #9c27b0); border-color: #e91e63; box-shadow: 0 0 25px rgba(233,30,99,0.5); transform: scale(1.05); }
.cycle-btn:hover:not(.active) { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
.timer-display { font-size: 4.5rem; font-weight: 900; margin: 35px 0; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.work-time { background: linear-gradient(45deg, #00ff88, #00cc6a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-family: monospace; letter-spacing: 0.2em; }
.rest-time { background: linear-gradient(45deg, #ff6b6b, #ee5a52); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-family: monospace; letter-spacing: 0.2em; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
.phase-badge { padding: 12px 30px; background: rgba(255,255,255,0.2); border-radius: 35px; font-size: 1.4rem; font-weight: 700; border: 2px solid rgba(255,255,255,0.4); margin: 20px 0; display: inline-block; }
.controls { display: flex; gap: 15px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
.btn { padding: 18px 32px; font-size: 18px; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(12px); min-width: 110px; font-family: inherit; }
.btn-primary { background: linear-gradient(45deg, #e91e63, #9c27b0); color: white; box-shadow: 0 12px 35px rgba(233,30,99,0.4); }
.btn-primary:hover:not(:disabled) { transform: translateY(-4px); box-shadow: 0 18px 45px rgba(233,30,99,0.6); }
.btn-secondary { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.4); }
.btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.35); transform: translateY(-2px); }
.progress-container { margin: 25px 0; }
.progress-label { font-size: 1.1rem; margin-bottom: 8px; font-weight: 600; }
.progress-bar { width: 100%; height: 16px; background: rgba(255,255,255,0.15); border-radius: 12px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #00ff88 0%, #e91e63 50%, #ff6b6b 100%); border-radius: 12px; transition: width 0.4s ease; box-shadow: 0 0 30px rgba(233,30,99,0.5); }
.cycles-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 20px; margin: 25px 0; }
.stat-card { background: rgba(255,255,255,0.12); padding: 20px 15px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.2); }
.stat-value { font-size: 2rem; font-weight: 800; color: #f1c40f; }
.stat-label { font-size: 0.9rem; opacity: 0.9; margin-top: 5px; }
.instruction { font-size: 1.25rem; margin-top: 25px; padding: 20px; background: rgba(255,255,255,0.08); border-radius: 18px; border-left: 5px solid #e91e63; font-weight: 600; }
@media (max-width: 480px) { .timer-display { font-size: 3.5rem; } .btn { padding: 16px 24px; font-size: 16px; } }
</style>
</head>
<body>
<div class="container">
<h1>🏹 Rhythm Drill</h1>
<div class="cycle-selector">
<button class="cycle-btn active" data-cycles="10">10 Cycles</button>
<button class="cycle-btn" data-cycles="20">20 Cycles</button>
<button class="cycle-btn" data-cycles="30">30 Cycles</button>
</div>
<div class="timer-display" id="timerDisplay">
<span id="timer">05</span>
</div>
<div class="phase-badge" id="phaseBadge">WORK - Raise & Hold</div>
<div class="progress-container">
<div class="progress-label">Cycle Progress</div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</div>
<div class="controls">
<button class="btn btn-primary" id="startBtn">▶️ START RHYTHM</button>
<button class="btn btn-secondary" id="resetBtn">🔄 Reset</button>
</div>
<div class="cycles-stats">
<div class="stat-card"><div class="stat-value" id="currentCycle">0</div><div class="stat-label">Current Cycle</div></div>
<div class="stat-card"><div class="stat-value" id="totalCycles">0</div><div class="stat-label">Completed</div></div>
<div class="stat-card"><div class="stat-value" id="totalTime">0s</div><div class="stat-label">Duration</div></div>
</div>
<div class="instruction" id="instruction">5s WORK (raise bow) → 2s REST (relax) → Repeat</div>
</div>
<script>
class RhythmDrill {
constructor() {
this.totalCycles = 10;
this.currentCycle = 0;
this.isWorkPhase = true;
this.remaining = 5;
this.isRunning = false;
this.startTime = 0;
this.drillStartTime = 0;
this.audioContext = null;
this.elements = {
timer: document.getElementById('timer'),
timerDisplay: document.getElementById('timerDisplay'),
phaseBadge: document.getElementById('phaseBadge'),
progress: document.getElementById('progress'),
startBtn: document.getElementById('startBtn'),
resetBtn: document.getElementById('resetBtn'),
currentCycle: document.getElementById('currentCycle'),
totalCycles: document.getElementById('totalCycles'),
totalTime: document.getElementById('totalTime'),
instruction: document.getElementById('instruction')
};
this.init();
}
init() {
this.bindEvents();
this.updateDisplay();
}
bindEvents() {
document.querySelectorAll('.cycle-btn').forEach(btn => {
btn.addEventListener('click', (e) => {
document.querySelectorAll('.cycle-btn').forEach(b => b.classList.remove('active'));
e.target.classList.add('active');
this.totalCycles = parseInt(e.target.dataset.cycles);
this.reset();
});
});
this.elements.startBtn.addEventListener('click', () => this.toggle());
this.elements.resetBtn.addEventListener('click', () => this.reset());
document.addEventListener('keydown', (e) => {
if (e.code === 'Space') { e.preventDefault(); this.toggle(); }
if (e.code === 'KeyR') this.reset();
});
}
toggle() {
if (this.isRunning) this.pause();
else this.start();
}
start() {
this.isRunning = true;
this.drillStartTime = Date.now();
this.startTime = Date.now();
this.elements.startBtn.textContent = '⏸️ PAUSE';
this.tick();
this.playBeep(1000, 0.2);
}
pause() {
this.isRunning = false;
this.elements.startBtn.textContent = '▶️ RESUME';
}
reset() {
this.currentCycle = 0;
this.isWorkPhase = true;
this.remaining = 5;
this.isRunning = false;
this.elements.startBtn.textContent = '▶️ START RHYTHM';
this.updateDisplay();
}
tick() {
if (!this.isRunning) return;
const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
const phaseDuration = this.isWorkPhase ? 5 : 2;
this.remaining = Math.max(0, phaseDuration - elapsed);
this.updateDisplay();
if (this.remaining <= 0) {
this.nextPhase();
}
requestAnimationFrame(this.tick.bind(this));
}
nextPhase() {
this.playBeep(this.isWorkPhase ? 1200 : 800, 0.15);
if (this.isWorkPhase) {
this.isWorkPhase = false;
this.remaining = 2;
this.startTime = Date.now();
} else {
this.currentCycle++;
this.isWorkPhase = true;
this.remaining = 5;
if (this.currentCycle >= this.totalCycles) {
this.complete();
return;
}
this.startTime = Date.now();
}
this.updateDisplay();
}
updateDisplay() {
  this.elements.timer.textContent = this.remaining.toString().padStart(2, '0');
  this.elements.timerDisplay.className = this.isWorkPhase ? 'timer-display work-time' : 'timer-display rest-time';
  this.elements.phaseBadge.textContent = this.isWorkPhase ? 'WORK - Raise & Hold' : 'REST - Relax Arms';
  this.elements.phaseBadge.className = this.isWorkPhase ? 'phase-badge work' : 'phase-badge rest';
  
  const progress = ((this.currentCycle + 1) / this.totalCycles) * 100;  // +1 for current
  this.elements.progress.style.width = `${progress}%`;
  
  this.elements.currentCycle.textContent = this.currentCycle + 1;  // Current: 1 ahead
  this.elements.totalCycles.textContent = this.currentCycle;       // Completed: actual done
  
  this.elements.totalTime.textContent = Math.floor((Date.now() - this.drillStartTime) / 1000) + 's';
  this.elements.instruction.textContent = this.isWorkPhase 
    ? '5s WORK: Raise bow to anchor, hold steady' 
    : '2s REST: Drop arms completely, shake out';
}
complete() {
  this.isRunning = false;
  this.elements.startBtn.textContent = '🎉 RHYTHM COMPLETE';
  this.elements.totalCycles.textContent = this.totalCycles;  // Final: show total
  this.playBeep(1500, 0.5);
  this.elements.instruction.textContent = `🏆 ${this.totalCycles} cycles done perfectly!`;
}
playBeep(frequency, duration) {
try {
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const o = ctx.createOscillator(), g = ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.frequency.value = frequency; o.type = 'sine';
g.gain.setValueAtTime(0.3, ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
o.start(ctx.currentTime); o.stop(ctx.currentTime + duration);
} catch(e) {}
}
}
new RhythmDrill();
</script>
</body>
</html>
