<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Bow Drill Timer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
.container { text-align: center; max-width: 400px; width: 90vw; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 25px; padding: 40px 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
h1 { font-size: 28px; margin-bottom: 25px; background: linear-gradient(45deg, #ffd700, #ffed4e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.duration-selector { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; }
.btn { padding: 15px 25px; font-size: 18px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px); min-width: 80px; }
.btn-primary { background: linear-gradient(45deg, #ff6b6b, #ee5a52); color: white; box-shadow: 0 8px 25px rgba(255,107,107,0.4); }
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(255,107,107,0.6); }
.btn-secondary { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.3); }
.btn-secondary:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
.timer-display { font-size: 4rem; font-weight: 900; margin: 40px 0; background: linear-gradient(45deg, #00d4ff, #0099cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-family: monospace; letter-spacing: 0.1em; min-height: 120px; display: flex; align-items: center; justify-content: center; }
.phase-indicator { font-size: 1.4rem; margin: 20px 0; padding: 12px 25px; background: rgba(255,255,255,0.15); border-radius: 50px; display: inline-block; font-weight: 600; }
.controls { display: flex; gap: 15px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
.btn-large { padding: 20px 40px; font-size: 20px; border-radius: 20px; }
.progress-bar { width: 100%; height: 12px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; margin: 25px 0; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00cc6a); border-radius: 10px; transition: width 0.3s ease; box-shadow: 0 0 20px rgba(0,255,136,0.5); }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; font-size: 16px; }
.stat { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; }
.stat-number { font-size: 2rem; font-weight: bold; color: #ffd700; display: block; }
@media (max-width: 480px) { .timer-display { font-size: 3rem; } .btn { padding: 12px 20px; font-size: 16px; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
.warning { animation: pulse 1s infinite; color: #ff4757; }
</style>
</head>
<body>
<div class="container">
<h1>🏹 Long Bow Drill</h1>
<div class="duration-selector">
<button class="btn btn-secondary" data-duration="30">30s</button>
<button class="btn btn-secondary" data-duration="60">60s</button>
<button class="btn btn-secondary active" data-duration="120">120s</button>
</div>
<div class="timer-display" id="timer">02:00</div>
<div id="phase" class="phase-indicator">Select Duration</div>
<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
<div class="controls">
<button class="btn btn-primary btn-large" id="startBtn">▶️ START</button>
<button class="btn btn-secondary btn-large" id="resetBtn">🔄 Reset</button>
</div>
<div class="stats">
<div class="stat"><span class="stat-number" id="reps">0</span>Total Reps</div>
<div class="stat"><span class="stat-number" id="avgTime">0s</span>Avg Hold</div>
</div>
<div id="instruction" style="font-size: 1.2rem; margin-top: 20px; font-weight: 500;">Raise bow, hold steady</div>
</div>
<script>
class LongDrillTimer {
constructor() {
this.duration = 120; // default 120s
this.remaining = 120;
this.isRunning = false;
this.startTime = 0;
this.reps = 0;
this.repTimes = [];
this.phase = 'idle';
this.audioContext = null;
this.detectRep = this.detectRep.bind(this);
this.elements = {
timer: document.getElementById('timer'),
phase: document.getElementById('phase'),
progress: document.getElementById('progress'),
startBtn: document.getElementById('startBtn'),
resetBtn: document.getElementById('resetBtn'),
reps: document.getElementById('reps'),
avgTime: document.getElementById('avgTime'),
instruction: document.getElementById('instruction')
};
this.init();
}
init() {
this.bindEvents();
this.updateDisplay();
}
bindEvents() {
document.querySelectorAll('[data-duration]').forEach(btn => {
btn.addEventListener('click', (e) => {
document.querySelectorAll('[data-duration]').forEach(b => b.classList.remove('active'));
e.target.classList.add('active');
this.duration = parseInt(e.target.dataset.duration);
this.remaining = this.duration;
this.updateDisplay();
});
});
this.elements.startBtn.addEventListener('click', () => this.toggle());
this.elements.resetBtn.addEventListener('click', () => this.reset());
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (this.isRunning && this.phase === 'holding') {
      this.detectRep(); // Count rep during drill!
    } else {
      this.toggle(); // Start/pause when not counting
    }
  }
  if (e.code === 'KeyR') this.reset();
});
}
toggle() {
if (this.isRunning) {
this.pause();
} else {
this.start();
}
}
start() {
this.isRunning = true;
this.startTime = Date.now();
this.phase = 'holding';
this.elements.startBtn.textContent = '⏸️ PAUSE';
this.elements.startBtn.classList.add('warning');
this.tick();
requestAnimationFrame(this.tick.bind(this));
this.playBeep(800, 0.2);
}
pause() {
this.isRunning = false;
this.elements.startBtn.textContent = '▶️ RESUME';
this.elements.startBtn.classList.remove('warning');
}
reset() {
this.isRunning = false;
this.remaining = this.duration;
this.reps = 0;
this.repTimes = [];
this.phase = 'idle';
this.elements.startBtn.textContent = '▶️ START';
this.elements.startBtn.classList.remove('warning');
this.updateDisplay();
}
tick() {
if (!this.isRunning) return;
const now = Date.now();
const elapsed = Math.floor((now - this.startTime) / 1000);
this.remaining = Math.max(0, this.duration - elapsed);
this.updateDisplay();
if (this.remaining <= 0) {
this.complete();
return;
}
requestAnimationFrame(this.tick.bind(this));
}
updateDisplay() {
const mins = Math.floor(this.remaining / 60);
const secs = this.remaining % 60;
this.elements.timer.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
const progress = ((this.duration - this.remaining) / this.duration) * 100;
this.elements.progress.style.width = `${progress}%`;
this.elements.reps.textContent = this.reps;
this.elements.avgTime.textContent = this.repTimes.length ? `${Math.round(this.getAvgRepTime())}s` : '0s';
this.updatePhaseDisplay();
}
updatePhaseDisplay() {
const instructions = {
idle: 'Ready to start long hold drill',
holding: 'HOLD BOW STEADY 👆',
complete: 'Drill Complete! 🎯'
};
this.elements.phase.textContent = instructions[this.phase] || 'Active';
this.elements.instruction.textContent = this.phase === 'holding' ? 'Keep elbow locked, shoulders down' : '';
}
getAvgRepTime() {
if (!this.repTimes.length) return 0;
return this.repTimes.reduce((a,b) => a+b, 0) / this.repTimes.length;
}
detectRep() {
if (this.phase !== 'holding') return;
// Simulate rep detection - in real app use pose detection
// For now, manual spacebar triggers rep
// MANUAL TRIGGER: Press SPACE during hold to count rep
this.reps++;
  this.repTimes.push(5); // placeholder - use real detection later
  this.updateDisplay();
  this.playBeep(1200, 0.1);
}
complete() {
this.isRunning = false;
this.phase = 'complete';
this.elements.startBtn.textContent = '🔄 New Drill';
this.playBeep(1000, 0.5);
this.playBeep(800, 0.3);
}
playBeep(frequency, duration) {
try {
const audioContext = this.audioContext || new (window.AudioContext || window.webkitAudioContext)();
const oscillator = audioContext.createOscillator();
const gainNode = audioContext.createGain();
oscillator.connect(gainNode);
gainNode.connect(audioContext.destination);
oscillator.frequency.value = frequency;
oscillator.type = 'sine';
gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
oscillator.start(audioContext.currentTime);
oscillator.stop(audioContext.currentTime + duration);
this.audioContext = audioContext;
} catch(e) { console.log('Audio disabled'); }
}
}
new LongDrillTimer();
</script>
</body>
</html>
